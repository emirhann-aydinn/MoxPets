menu:
  title: "&#00D4FFPet &8» &7Yönetim Paneli"
  size: 45

  # P = Pet Stats (Orta)
  # W = Wardrobe (Kıyafet)
  # T = Trails (İzler)
  # B = Buffs (Güçler)
  # G = Glow (Parıldama)
  # S = Savunma Modu (Kubbe)
  # D = Despawn (Gönder)
  pattern:
    - "X X X G P B X X X"
    - "X X X X X X X X X"
    - "X S X W X T X D X"
    - "X X X X X X X X X"
    - "M X X X X X X X X"

  items:
    'X': { material: BLACK_STAINED_GLASS_PANE, name: " " }
    'M': { action: "OPEN_OWNED", material: ARROW, name: "&#FFAA00« Koleksiyon Listesi" }

    # ORTA: DETAYLI İSTATİSTİK
    'P':
      material: PLAYER_HEAD
      name: "&#00FF77%pet%"
      lore:
        - "&8------------------------"
        - "&7Seviye: &#FFFF00%level%"
        - "&7Sonraki Seviye:"
        - "%progress_bar% &e%percentage%%"
        - ""
        - "&7Kalan Süre: &b%time_left%"
        - "&8------------------------"

    'G':
      action: "TOGGLE_GLOW"
      material: GLOW_BERRIES
      name: "&#FFFF55Parıldama Efekti"
      lore:
        - "&7Petinin etrafında parlayan"
        - "&7bir aura oluşturur."
        - ""
        - "&7Durum: %glow_status%"
        - "&#FFFF55» Aç/Kapa"

    'B':
      action: "OPEN_BUFFS"
      material: BEACON
      name: "&#FF0055Güçlendirmeler"
      lore:
        - "&7Petinin sana verdiği"
        - "&7özellikleri yönet."
        - ""
        - "&#FF0055» Menüyü Aç"

    'S':
      action: "TOGGLE_DEFENSE"
      material: SHIELD
      name: "&#00D4FFSavunma Modu"
      lore:
        - "&7Etrafında seni dış etkenlerden"
        - "&7koruyan bir kubbe oluşturur."
        - "&7Altındaki blok kırılırsa seni"
        - "&7sabit olarak havada tutar."
        - ""
        - "&7Durum: %status%"
        - "&#00D4FF» Aç/Kapa"

    'W':
      action: "OPEN_WARDROBE"
      material: LEATHER_CHESTPLATE
      name: "&#00D4FFGardırop"
      lore:
        - "&7Zırh ve aksesuarlar."

    'T':
      action: "OPEN_TRAILS"
      material: BLAZE_POWDER
      name: "&#FF5500İz Efektleri"
      lore:
        - "&7Arkasından çıkan efektler."

    'D':
      action: "REMOVE_PET"
      material: BARRIER
      name: "&#FF3333Peti Gönder"
      lore:
        - "&7Peti dinlenmeye yolla."