menu:
  title: "&#33FF57Pet Efektleri (İzler)"
  size: 54

  # A-Z arası efektler, R = Kaldır, M = Ana Menü
  pattern:
    - "# # # # # # # # #"
    - "# A B C D E F G #"
    - "# H I J K L M N #"
    - "# O P S T U V # #"
    - "# # # # # # # # #"
    - "< # # * # R # # >"

  items:
    '#':
      material: BLACK_STAINED_GLASS_PANE
      name: " "
    '*':
      action: "OPEN_SETTINGS"
      material: COMPASS
      name: "&7Ana Menüye Dön"
      
    '<':
      action: "PREVIOUS_PAGE"
      material: ARROW
      name: "&e« Önceki Sayfa"
    '>':
      action: "NEXT_PAGE"
      material: ARROW
      name: "&aSonraki Sayfa »"
    'R':
      action: "REMOVE_TRAIL"
      material: BARRIER
      name: "&cİzi Kaldır"
      lore:
        - "&7Mevcut efekti kapatır."

    # --- EFEKTLER ---
    # value: Bukkit Particle İsmi (HEART, FLAME, VILLAGER_HAPPY vb.)
    # Yetki: moxpets.trails.<value_küçük_harf>

